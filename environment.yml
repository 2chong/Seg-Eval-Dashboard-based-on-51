name: fiftyone-seg-eval

channels:
  - conda-forge      # rasterio, geopandas, shapely, scipy, matplotlib, etc.
  - defaults

dependencies:
  - python=3.10

  # 공간 데이터 처리 (conda-forge)
  - matplotlib>=3.7    # confusion matrix PNG export
  - scipy>=1.10        # scipy.ndimage.binary_erosion
  - rasterio>=1.3      # GeoTIFF windowed read
  - geopandas>=0.14    # SHP 파싱
  - shapely>=2.0       # 벡터 연산
  - pyproj>=3.6        # 좌표계 변환
  - pip

  - pip:
    - fiftyone>=0.23   # main framework
    - Pillow>=10.0     # mask PNG I/O
    - numpy>=1.24
    - tqdm>=4.0
    - kaleido>=0.2     # plotly -> PNG export (optional; used in confusion matrix)
